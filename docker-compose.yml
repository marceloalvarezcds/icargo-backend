version: '3.3'

services:
  backend:
    depends_on:
      - db
      - pictshare
    env_file:
      - .env
    build:
      context: .
      args:
        INSTALL_DEV: ${INSTALL_DEV}
    ports:
      - ${BACKEND_PORT}:80
    volumes:
      - ./alembic:/app/alembic
      - ./app/reports:/app/app/reports

  db:
    image: postgres:13.4-buster
    ports:
      - ${DATABASE_PORT}:5432
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASS}
      - TZ=America/Asuncion
    # volumes:
    #   - db:/var/lib/postgresql/data
    # restart: always

  pictshare:
    image: hascheksolutions/pictshare:latest
    ports:
      - ${PICTSHARE_PORT}:80
    volumes:
      - pictshare:/usr/share/nginx/html/data

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    # restart: always
    # volumes:
    #   - ./backups:/backups
    links:
      - db:db
    depends_on:
      - db
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASS}
      - POSTGRES_EXTRA_OPTS=-Z9 --schema=public --blobs
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=2
      - HEALTHCHECK_PORT=666

volumes:
  db:
  pictshare:
